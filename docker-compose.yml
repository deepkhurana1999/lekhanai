services:
  ollama:
    image: ollama/ollama
    container_name: lekhanai-ollama
    ports:
      - "11434:11434"
    networks:
      - lekhanai-network

  backend:
    build:
      context: .
      dockerfile: ./backend/docker/Dockerfile.dev
    container_name: lekhanai-backend
    env_file:
      - ./backend/template.env
    ports:
      - "8080:8080"
    command: sh -c "cd /app && ./build/lekhanai-backend"
    networks:
      - lekhanai-network
networks:
  lekhanai-network:
