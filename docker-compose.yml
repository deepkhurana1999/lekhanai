services:
  ollama:
    image: ollama/ollama
    container_name: lekhanai-ollama
    ports:
      - "11434:11434"
    networks:
      - lekhanai-network

  stt:
    build:
      context: .
      dockerfile: ./backend/stt/docker/Dockerfile.dev
    container_name: lekhanai-stt
    env_file:
      - ./backend/stt/template.env
    ports:
      - "8080:8080"
    command: sh -c "cd /app && ./build/stt"
    networks:
      - lekhanai-network
  manager:
    build:
      context: ./backend/manager
      dockerfile: Dockerfile
    container_name: lekhanai-manager
    ports:
      - "5000:5000"
    networks:
      - lekhanai-network

  analyser:
    build:
      context: ./backend/analyser
      dockerfile: Dockerfile
    container_name: lekhanai-analyser
    ports:
      - "8004:8004"
    networks:
      - lekhanai-network
networks:
  lekhanai-network:
