<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Note Taker Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 14px;
        }

        #log {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            background: #f9f9f9;
            margin-top: 10px;
        }

        .section {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #ddd;
        }

        input[type="file"] {
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <h1>AI Note Taker Client</h1>

    <!-- WebSocket Connection -->
    <div class="section">
        <h3>Connection</h3>
        <button id="connectBtn">Connect to Server</button>
        <span id="connectionStatus">Disconnected</span>
    </div>

    <!-- Live Recording -->
    <div class="section">
        <h3>Live Recording</h3>
        <button id="startBtn" disabled>Start Live Recording</button>
        <button id="stopBtn" disabled>Stop Recording</button>
    </div>

    <!-- File Upload -->
    <div class="section">
        <h3>Upload Pre-recorded Audio</h3>
        <input type="file" id="fileInput" accept="audio/*" disabled>
        <button id="sendFileBtn" disabled>Send File to Server</button>
        <div id="fileInfo"></div>
    </div>

    <!-- Actions -->
    <div class="section">
        <h3>Actions</h3>
        <button id="summaryBtn" disabled>Generate Summary</button>
        <button id="clearLogBtn">Clear Log</button>
    </div>

    <!-- Log Output -->
    <div id="log"></div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fileInput = document.getElementById('fileInput');
        const sendFileBtn = document.getElementById('sendFileBtn');
        const summaryBtn = document.getElementById('summaryBtn');
        const clearLogBtn = document.getElementById('clearLogBtn');
        const logDiv = document.getElementById('log');
        const connectionStatus = document.getElementById('connectionStatus');
        const fileInfo = document.getElementById('fileInfo');

        let ws;
        let mediaRecorder;
        let audioStream;
        let selectedFile = null;

        function log(msg) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${msg}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateConnectionStatus(status) {
            connectionStatus.textContent = status;
            connectionStatus.style.color = status === 'Connected' ? 'green' : 'red';
        }

        // WebSocket Connection
        connectBtn.addEventListener('click', () => {
            ws = new WebSocket('ws://localhost:8080');
            ws.binaryType = 'arraybuffer';

            ws.addEventListener('open', () => {
                log('Connected to WebSocket server');
                updateConnectionStatus('Connected');
                startBtn.disabled = false;
                fileInput.disabled = false;
                summaryBtn.disabled = false;
                connectBtn.disabled = true;
            });

            ws.addEventListener('message', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'transcription') {
                        log(`[Transcript] ${data.text}`);
                    } else if (data.type === 'summary') {
                        log(`[Summary] ${data.summary}`);
                    } else {
                        log(`[Server] ${JSON.stringify(data)}`);
                    }
                } catch (e) {
                    log('[Server] Received non-JSON message');
                }
            });

            ws.addEventListener('close', () => {
                log('Disconnected from server');
                updateConnectionStatus('Disconnected');
                startBtn.disabled = true;
                stopBtn.disabled = true;
                fileInput.disabled = true;
                sendFileBtn.disabled = true;
                summaryBtn.disabled = true;
                connectBtn.disabled = false;
            });

            ws.addEventListener('error', (err) => {
                log('WebSocket error occurred');
                console.error(err);
            });
        });

        // Live Recording
        startBtn.addEventListener('click', async () => {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1
                    }
                });

                mediaRecorder = new MediaRecorder(audioStream, {
                    mimeType: 'audio/webm;codecs=opus'
                });

                mediaRecorder.addEventListener('dataavailable', (event) => {
                    if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                        event.data.arrayBuffer().then(buffer => {
                            ws.send(buffer);
                            log(`Sent live audio chunk (${buffer.byteLength} bytes)`);
                        });
                    }
                });

                mediaRecorder.start(500 * 10); // 5000ms chunks
                log('Started live recording');
                startBtn.disabled = true;
                stopBtn.disabled = false;
                fileInput.disabled = true;
                sendFileBtn.disabled = true;
            } catch (err) {
                log('Error starting recording: ' + err.message);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                audioStream.getTracks().forEach(track => track.stop());
                log('Stopped live recording');
                stopBtn.disabled = true;
                startBtn.disabled = false;
                fileInput.disabled = false;
                sendFileBtn.disabled = selectedFile ? false : true;
            }
        });

        // File Upload
        fileInput.addEventListener('change', (event) => {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                fileInfo.textContent = `Selected: ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(2)} MB)`;
                sendFileBtn.disabled = false;
                log(`File selected: ${selectedFile.name}`);
            } else {
                fileInfo.textContent = '';
                sendFileBtn.disabled = true;
            }
        });

        sendFileBtn.addEventListener('click', () => {
            if (!selectedFile || ws.readyState !== WebSocket.OPEN) {
                log('No file selected or not connected');
                return;
            }

            log(`Sending file: ${selectedFile.name}`);
            sendFileBtn.disabled = true;

            // Read file and send in chunks
            const reader = new FileReader();
            reader.onload = (e) => {
                const arrayBuffer = e.target.result;
                const chunkSize = arrayBuffer.length; // 64KB chunks
                let offset = 0;

                function sendNextChunk() {
                    if (offset < arrayBuffer.byteLength) {
                        const chunk = arrayBuffer.slice(offset, offset + chunkSize);
                        ws.send(chunk);
                        offset += chunkSize;

                        const progress = ((offset / arrayBuffer.byteLength) * 100).toFixed(1);
                        log(`Sent chunk: ${progress}% complete`);

                        // Send next chunk after a small delay
                        setTimeout(sendNextChunk, 50);
                    } else {
                        log('File upload complete');
                        sendFileBtn.disabled = false;
                    }
                }

                sendNextChunk();
            };

            reader.onerror = () => {
                log('Error reading file');
                sendFileBtn.disabled = false;
            };

            reader.readAsArrayBuffer(selectedFile);
        });

        // Actions
        summaryBtn.addEventListener('click', () => {
            if (ws.readyState === WebSocket.OPEN) {
                const msg = JSON.stringify({ type: 'generate_summary' });
                ws.send(msg);
                log('Requested summary generation');
            }
        });

        clearLogBtn.addEventListener('click', () => {
            logDiv.textContent = '';
            log('Log cleared');
        });
    </script>
</body>

</html>
